<!DOCTYPE html>
<html>
<head>
    <title>{{ note_name }} | NoteSync</title>
    <link rel="stylesheet" href="/static/style.css">

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .top-bar {
            background: #2c3e50;
            color: white;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
        }

        .toolbar {
            display: flex;
            gap: 10px;
            padding: 10px;
            background: #f3f3f3;
            border-bottom: 1px solid #ccc;
            flex-wrap: wrap;
        }

        .group {
            display: flex;
            gap: 5px;
            border-right: 1px solid #ccc;
            padding-right: 10px;
        }

        .group:last-child {
            border-right: none;
        }

        .toolbar button,
        .toolbar select {
            padding: 5px 8px;
            border: 1px solid #ccc;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .toolbar button:hover {
            background: #e0e0e0;
        }

        #editor {
            min-height: 500px;
            padding: 15px;
            outline: none;
        }
    </style>
</head>

<body>

<div class="top-bar">
    <span>NoteSync</span>
    <span class="note-name">{{ note_name }}</span>
</div>

<!-- TOOLBAR -->
<div class="toolbar">

    <!-- FONT -->
    <select id="fontSelect">
        <option value="">Font</option>
        <option value="Arial">Arial</option>
        <option value="Times New Roman">Times</option>
        <option value="Courier New">Courier</option>
    </select>

    <select id="fontSize">
        <option value="">Size</option>
        <option value="1">Small</option>
        <option value="3">Normal</option>
        <option value="5">Large</option>
        <option value="7">Huge</option>
    </select>

    <!-- STYLE -->
    <div class="group">
        <button onclick="format('bold', this)"><b>B</b></button>
        <button onclick="format('italic', this)"><i>I</i></button>
        <button onclick="format('underline', this)"><u>U</u></button>
    </div>

    <!-- LIST -->
    <div class="group">
        <button type="button" onclick="format('insertUnorderedList')">•</button>
        <button type="button" onclick="format('insertOrderedList')">1.</button>
    </div>

    <!-- ALIGN -->
    <div class="group">
        <button type="button" onclick="format('justifyLeft')">⯇</button>
        <button type="button" onclick="format('justifyCenter')">≡</button>
        <button type="button" onclick="format('justifyRight')">⯈</button>
    </div>

    <!-- HEADING -->
    <div class="group">
        <button type="button" onclick="addHeading()">H1</button>
    </div>

    <!-- INSERT -->
    <div class="group">
        <button  type="button" onclick="openImagePicker()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-image" viewBox="0 0 16 16">
            <path d="M6.002 5.5a1.5 1.5 0 1 1-3 0 1.5 1.5 0 0 1 3 0"/>
            <path d="M2.002 1a2 2 0 0 0-2 2v10a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V3a2 2 0 0 0-2-2zm12 1a1 1 0 0 1 1 1v6.5l-3.777-1.947a.5.5 0 0 0-.577.093l-3.71 3.71-2.66-1.772a.5.5 0 0 0-.63.062L1.002 12V3a1 1 0 0 1 1-1z"/>
            </svg>
        </button>
        <button type="button" onclick="addTable()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-table" viewBox="0 0 16 16">
            <path d="M0 2a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H2a2 2 0 0 1-2-2zm15 2h-4v3h4zm0 4h-4v3h4zm0 4h-4v3h3a1 1 0 0 0 1-1zm-5 3v-3H6v3zm-5 0v-3H1v2a1 1 0 0 0 1 1zm-4-4h4V8H1zm0-4h4V4H1zm5-3v3h4V4zm4 4H6v3h4z"/>
            </svg>
        </button>

        <button onclick="addTimestamp()">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-alarm" viewBox="0 0 16 16">
            <path d="M8.5 5.5a.5.5 0 0 0-1 0v3.362l-1.429 2.38a.5.5 0 1 0 .858.515l1.5-2.5A.5.5 0 0 0 8.5 9z"/>
            <path d="M6.5 0a.5.5 0 0 0 0 1H7v1.07a7.001 7.001 0 0 0-3.273 12.474l-.602.602a.5.5 0 0 0 .707.708l.746-.746A6.97 6.97 0 0 0 8 16a6.97 6.97 0 0 0 3.422-.892l.746.746a.5.5 0 0 0 .707-.708l-.601-.602A7.001 7.001 0 0 0 9 2.07V1h.5a.5.5 0 0 0 0-1zm1.038 3.018a6 6 0 0 1 .924 0 6 6 0 1 1-.924 0M0 3.5c0 .753.333 1.429.86 1.887A8.04 8.04 0 0 1 4.387 1.86 2.5 2.5 0 0 0 0 3.5M13.5 1c-.753 0-1.429.333-1.887.86a8.04 8.04 0 0 1 3.527 3.527A2.5 2.5 0 0 0 13.5 1"/>
            </svg>
        </button>

    </div>
    

</div>

<input type="file" id="imageInput" accept="image/*" style="display:none">

<!-- ✅ EDITOR -->
<div id="editor" contenteditable="true">
    {{ content|safe }}
</div>

<script src="/static/script.js"></script>

</body>
</html>
